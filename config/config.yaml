# =============================================================================
# MT5 Trading Bot - Master Configuration File
# =============================================================================
# This single file controls the ENTIRE bot. Enable/disable heavy features here
# depending on your hardware. On a weak CPU-only Windows 7 machine, keep the
# heavy ML/DL/RL modules disabled and rely on the lightweight ML + indicator
# strategies.
#
# IMPORTANT: Only standard English (ASCII) characters are allowed in this file.
# =============================================================================

# -----------------------------------------------------------------------------
# General runtime settings
# -----------------------------------------------------------------------------
general:
  bot_name: "MT5SmartBot"
  # Operating mode: "live", "paper", "backtest", "search", "train"
  #   live     -> connect to MT5 and place real orders
  #   paper    -> connect to MT5, generate signals, but do NOT place orders
  #   backtest -> run internal walk-forward backtest on historical data
  #   search   -> run strategy/parameter search (Phase 3 memory builder)
  #   train    -> run the offline ML training pipeline (Phase 1)
  mode: "paper"
  # Master switch for heavy compute. On Windows 7 + weak CPU keep this false.
  enable_heavy_compute: false
  # Random seed for reproducibility across the whole project.
  random_seed: 42
  # Timezone used for logging and news alignment (IANA name).
  timezone: "UTC"
  # U5.3 pre-flight gate: when true (default), LIVE mode refuses to start
  # unless a PASS gauntlet verdict (backtests/gauntlet_<fingerprint>.md,
  # produced by scripts/gauntlet.py) exists for the registry top-1 strategy
  # AND that verdict is newer than the last search that produced the registry.
  # Paper/backtest/search/train modes are never blocked by this gate. Set to
  # false only for controlled experiments - going live without a verdict means
  # trading a strategy that never survived the gauntlet.
  live_requires_gauntlet: true

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"            # DEBUG, INFO, WARNING, ERROR
  log_to_file: true
  log_dir: "logs"
  max_bytes: 5242880       # 5 MB per log file before rotation
  backup_count: 5

# -----------------------------------------------------------------------------
# MT5 connection (Phase: execution layer)
# -----------------------------------------------------------------------------
# These are read by core/data/mt5_connector.py and core/execution/*.
# Leave login/password/server empty to attach to an already-running terminal.
mt5:
  enabled: true
  # Full path to terminal64.exe. Leave empty to auto-detect a running terminal.
  terminal_path: ""
  login: 0                 # account number (0 = use running terminal session)
  password: ""
  server: ""
  # How long to wait for the terminal connection (milliseconds).
  connect_timeout_ms: 60000
  # Symbols the bot is allowed to trade / analyze.
  # OPTIMIZED: this bot is dedicated to GOLD (XAUUSD) only. Every training run,
  # strategy search and live decision targets XAUUSD, so nothing dilutes the
  # gold model and every CPU cycle is spent on the one instrument we trade.
  symbols:
    - "XAUUSD"
  # Default working timeframe for live decisions.
  timeframe: "M15"
  # Timeframes the data layer should fetch for multi-timeframe analysis.
  # Kept to M15 (the decision timeframe) plus H1 context. Fewer timeframes =
  # less data to pull and a faster loop on a weak CPU. Add H4 back only if you
  # actually consume it somewhere.
  timeframes:
    - "M15"
    - "H1"
  # Number of historical bars to pull for analysis.
  # OPTIMIZED for the ~150k-bar XAUUSD M15 CSV you exported: pulling up to
  # 200000 bars means train/search/backtest use your FULL history instead of
  # only the last 5000 bars. The CSV loader safely uses however many bars exist
  # (it never pads), so a smaller file still works. If a live decision pass ever
  # feels slow on the weak box, the live loop only needs recent bars - lower
  # this or pass an explicit count there.
  history_bars: 200000

# -----------------------------------------------------------------------------
# Risk and order management (execution layer)
# -----------------------------------------------------------------------------
risk:
  # Risk per trade as a fraction of account equity (0.01 = 1%).
  # Gold moves fast; 1% keeps a single bad trade from hurting while still
  # letting the account compound. ATR-based sizing (below) does the heavy work.
  risk_per_trade: 0.01
  # Hard cap on simultaneous open positions. Single-symbol bot: allow a small
  # number of concurrent XAUUSD entries (e.g. pyramiding / different strategies)
  # but keep it tight because they are all correlated (same instrument).
  max_open_positions: 2
  # Maximum daily loss as fraction of equity before the bot stops trading.
  # Gold's volatility warrants a slightly tighter daily circuit-breaker.
  max_daily_loss: 0.04
  # Default stop-loss / take-profit in ATR multiples (used if strategy omits).
  # Wider SL for gold's noise; TP gives a ~1.75:1 reward:risk by default.
  default_sl_atr_mult: 2.5
  default_tp_atr_mult: 4.0
  # Minimum and maximum lot sizes for XAUUSD (broker-dependent - verify with
  # your broker's contract specs). Gold lots are large in $ terms, so cap max.
  min_lot: 0.01
  max_lot: 0.50
  # Slippage tolerance in points. Gold spreads/slippage are wider than FX.
  deviation_points: 30
  # Magic number to tag this bot's orders inside MT5.
  magic_number: 990011

# -----------------------------------------------------------------------------
# Indicator layer (Phase 2)
# -----------------------------------------------------------------------------
# Each indicator is pluggable. "enabled" toggles it. "params" override defaults.
indicators:
  # Trend
  sma:        { enabled: true,  params: { period: 50 } }
  ema:        { enabled: true,  params: { period: 21 } }
  macd:       { enabled: true,  params: { fast: 12, slow: 26, signal: 9 } }
  adx:        { enabled: true,  params: { period: 14 } }
  ichimoku:   { enabled: false, params: { tenkan: 9, kijun: 26, senkou: 52 } }
  supertrend: { enabled: true,  params: { period: 10, multiplier: 3.0 } }
  # Phase 5 additional trend indicators (pure Python, CPU-light)
  psar:       { enabled: false, params: { step: 0.02, max_step: 0.2 } }
  vwma:       { enabled: false, params: { period: 20 } }
  # Momentum
  rsi:        { enabled: true,  params: { period: 14 } }
  stoch:      { enabled: true,  params: { k: 14, d: 3, smooth: 3 } }
  cci:        { enabled: false, params: { period: 20 } }
  williams_r: { enabled: false, params: { period: 14 } }
  roc:        { enabled: false, params: { period: 12 } }
  # Phase 5 additional momentum indicators
  stochrsi:   { enabled: false, params: { rsi_period: 14, stoch_period: 14 } }
  dpo:        { enabled: false, params: { period: 20 } }
  # Volatility
  atr:        { enabled: true,  params: { period: 14 } }
  bbands:     { enabled: true,  params: { period: 20, std: 2.0 } }
  keltner:    { enabled: false, params: { period: 20, atr_mult: 2.0 } }
  donchian:   { enabled: false, params: { period: 20 } }
  # Volume
  obv:        { enabled: false, params: {} }
  mfi:        { enabled: false, params: { period: 14 } }
  vwap:       { enabled: false, params: {} }
  # Pattern detection
  candle_patterns: { enabled: true, params: {} }

# -----------------------------------------------------------------------------
# Learning core (Phase 1) - each module optional and swappable
# -----------------------------------------------------------------------------
learning:
  # Which learner the decision engine should ask for predictions.
  # Options: "ml_classifier", "rl_agent", "dl_classifier", "transfer",
  #          "self_supervised", "none"
  active_model: "ml_classifier"

  # Per-symbol ML models (A5 / P3.3-P3.4). Default false = one SHARED model for
  # every symbol (byte-identical to the original behavior). When true:
  #   - train (--mode train) trains a SEPARATE learner per symbol and saves each
  #     as models/<model>_<SYMBOL>.pkl so, e.g., XAUUSD does not dilute EURUSD;
  #   - the decision engine loads and uses the model for the symbol it is
  #     deciding on, falling back to the shared model when a per-symbol file is
  #     missing (e.g. that symbol has not been trained yet). Missing files never
  #     crash the bot; the learner simply contributes a neutral signal.
  per_symbol: false

  ml_classifier:
    enabled: true
    # backend: "lightgbm" (preferred, light) or "sklearn_gbdt" (fallback)
    backend: "lightgbm"
    model_file: "models/ml_classifier.pkl"
    # Forward horizon in bars used to build the training label.
    label_horizon: 5
    # Threshold (in ATR units) for labeling up/down/flat.
    label_threshold_atr: 0.5
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    # Phase 5: fit a light Platt-style probability calibrator on a held-out
    # tail of the training data. Cheap on CPU. Set true for better-calibrated
    # confidence used by the decision engine's optional confidence gate.
    calibrate: true

  rl_agent:
    enabled: false           # HEAVY-ish; keep off on weak hardware
    backend: "tabular_q"     # "tabular_q" is CPU-light; avoid deep RL on Win7
    model_file: "models/rl_qtable.pkl"
    episodes: 50
    gamma: 0.95
    alpha: 0.1
    epsilon: 0.1

  dl_classifier:
    enabled: false           # HEAVY; requires tensorflow/torch, off by default
    backend: "keras_mlp"
    model_file: "models/dl_classifier.h5"
    epochs: 20
    batch_size: 64

  transfer:
    enabled: false           # depends on dl_classifier; off by default
    source_model_file: "models/dl_classifier.h5"
    target_model_file: "models/transfer_model.h5"
    freeze_layers: 2
    epochs: 10

  self_supervised:
    enabled: false           # off by default; CPU-light pretext task
    backend: "autoencoder_sklearn"
    model_file: "models/ssl_encoder.pkl"
    code_size: 8

# -----------------------------------------------------------------------------
# Memory & self-improvement (Phase 3)
# -----------------------------------------------------------------------------
memory:
  # SQLite database that persists every backtest result and chosen strategies.
  db_file: "data_store/memory.sqlite"
  # JSON snapshot of the current best-strategy registry (human readable).
  registry_file: "data_store/strategy_registry.json"
  # Walk-forward configuration.
  # OPTIMIZED for the large ~150k-bar XAUUSD M15 history: bigger train/test
  # windows give each fold enough gold data to be statistically meaningful,
  # while more segments (min_segments below) test robustness across many market
  # regimes (trending gold, ranging gold, high-vol news spikes).
  walk_forward:
    train_bars: 8000
    test_bars: 2000
    step_bars: 2000
    # Statistical robustness (Track A / A2). These are read by later steps
    # (P1.3 segments, P1.4 holdout). Leaving them at the defaults below keeps
    # today's walk-forward behavior byte-identical.
    # Target number of rolling walk-forward segments. The segmenter will try to
    # produce at least this many by shrinking train_bars when the history is
    # long enough; short history still falls back to the 70/30 split.
    # With ~150k bars we can afford many folds for a robust gold edge.
    min_segments: 10
    # Bars reserved at the END of history as a locked "quarantine" holdout that
    # the search NEVER sees. 0 = OFF (no holdout, behavior unchanged). When > 0,
    # a strategy is only promoted to the registry if it also passes on this
    # untouched holdout.
    holdout_bars: 0
    # Recency weighting (Track B / B8, P6.1). When aggregating the per-segment
    # walk-forward scores into a single number, newer segments can be made to
    # count MORE than older ones via a geometric decay: the i-th oldest segment
    # (0 = oldest) gets weight recency_decay ** (last_index - i), so the most
    # recent segment always has weight 1.0. This guards against a strategy that
    # was great years ago but has quietly stopped working. 1.0 = OFF (plain
    # average, behavior byte-identical to before); a value in (0, 1) such as 0.9
    # down-weights older segments. Values <= 0 or > 1 are clamped back to 1.0.
    # OPTIMIZED for gold: 0.9 down-weights old regimes so a strategy that only
    # worked on years-old gold behavior is not promoted over one that works now.
    recency_decay: 0.9
  # Strategy/parameter search configuration.
  #
  # ---------------------------------------------------------------------------
  # DEEP SEARCH PROFILE (UPGRADE_PLAN.md U4.1) - spend a 12-24h budget wisely.
  # ---------------------------------------------------------------------------
  # The defaults below are the fast ~6h research profile. To run a deep,
  # robustness-first search (fewer but far more trustworthy strategies), raise
  # the following knobs. Everything scales via config; nothing here is required
  # for the light path, and leaving the defaults keeps behavior byte-identical.
  #
  #   memory.search.max_trials                 400   -> 4000   (or more)
  #   memory.search.significance.n_boot        1000  -> 5000   (tighter p-value)
  #   memory.walk_forward.holdout_bars         0     -> 15000  (~6 months M15
  #                                                             locked quarantine)
  #   memory.walk_forward.min_segments         10    -> 12     (more regimes)
  #   memory.search.time_budget_hours          0     -> 12..24 (wall-clock cap;
  #                                                             0 = OFF)
  #
  # The deep profile pairs with the U4.2 evolutionary generator, the U4.3
  # multi-seed stability gate, the U4.4 parameter-neighborhood robustness gate,
  # and the U4.5 regime-sliced floors: a 24h run on ~150k bars should evaluate
  # >= 4000 specs and promote only strategies that pass significance + holdout
  # + multi-seed + neighborhood + regime floors. See README "Deep search
  # profile - what 24 hours buys you".
  # ---------------------------------------------------------------------------
  search:
    method: "random"         # "random", "grid", or "evolution" (U4.2)
    # Evolutionary search knobs (U4.2). Only used when method == "evolution".
    # The loop keeps an elite pool (the top elite_fraction of everything scored
    # so far) and breeds mutate_fraction of each new generation from those
    # elites (mutate one param step / swap one indicator / +-0.05 thresholds /
    # crossover two elites); the rest are fresh random specs for exploration.
    # Every child is deduped by fingerprint. Leaving these at the defaults is
    # safe; they are ignored entirely by the "random" and "grid" methods.
    evolution:
      elite_fraction: 0.10   # top 10% kept as breeding parents
      mutate_fraction: 0.60  # 60% bred from elites, 40% fresh random
    # EA-COMPATIBLE SEARCH (U2.2). When true, the random/grid/evolutionary
    # spec generators draw ONLY from the indicator set the MQL5 EA can run
    # (ema, sma, rsi, macd, adx among directional voters). Anything promoted
    # is then exportable to the EA 1:1 with no dropped indicators. This is the
    # RECOMMENDED workflow for anyone who validates strategies in the MT5
    # Strategy Tester. Default false keeps the full research indicator set.
    ea_compatible_only: false
    # OPTIMIZED: single symbol + lots of data means we can explore more
    # parameter combinations to find a genuinely good gold strategy.
    max_trials: 400
    # Wall-clock budget for a search run, in hours (U4.1). 0 = OFF (run all
    # max_trials, unchanged behavior). When > 0, the search stops CLEANLY as
    # soon as the budget expires - it ranks whatever specs were evaluated so
    # far and writes the registry normally, so a 12-24h run never has to be
    # babysat. Combine with a large max_trials so the budget (not the trial
    # count) is the real stopping condition on a deep run.
    time_budget_hours: 0
    # SEARCH CHECKPOINTING (U4.6). A deep 12-24h run must survive a reboot /
    # crash without throwing away hours of compute. Every `checkpoint_every`
    # evaluated trials the search atomically writes its STATE (the set of
    # fingerprints already tried, the running trial count, and the current
    # evolutionary elite pool) to data_store/search_ckpt_<SYMBOL>_<TF>.json.
    # Re-launch with `python main.py --mode search --resume` and the run picks
    # up exactly where it stopped: already-seen fingerprints are skipped (never
    # re-evaluated), the trial count / time budget continue, and evolution
    # resumes from the restored elite pool. The SQLite results table already
    # persists every RESULT; this only adds the search state on top. Set
    # checkpoint_every: 0 to disable checkpoint writes entirely.
    checkpoint:
      checkpoint_every: 25   # write the checkpoint every N evaluated trials
      max_scored: 200        # cap on top specs stored (rebuilds the elite pool)
    # MULTI-SEED STABILITY GATE (U4.3). A strategy that only wins under one
    # lucky bootstrap seed / warmup offset is a knife-edge fluke, not an edge.
    # When enabled, any candidate that would ENTER the registry is re-run
    # `n_seeds` extra times with a different bootstrap seed AND a jittered warmup
    # each time; promotion requires the rank score to stay STRICTLY POSITIVE in
    # every run (the original evaluation plus all re-runs). Only finalists pay
    # this cost, so it stays CPU-cheap even on a big search. Default OFF keeps
    # the old behavior; turn it on for deep/live-bound runs.
    stability:
      enabled: false
      n_seeds: 3             # extra re-runs (each a new seed + warmup jitter)
      warmup_jitter: 20      # +/- bars added to the 60-bar warmup per re-run
      require_all_positive: true  # every run's rank score must be > 0
    # PARAMETER-NEIGHBORHOOD ROBUSTNESS GATE (U4.4). A strategy that only wins
    # at an EXACT parameter value (e.g. RSI period 14 but not 13 or 15) is
    # overfit by definition. When enabled, each finalist that would enter the
    # registry is re-scored at `n_neighbors` neighboring parameter sets (each
    # neighbor nudges ONE key param one step in its own param_space). A new
    # metric `neighborhood_score` = median neighbor score, and the registry
    # ranks by min(own_score, neighborhood_score) so a knife-edge peak is
    # demoted below a broad, robust plateau. Only finalists pay the cost, so it
    # stays CPU-cheap. Default OFF keeps the old ranking (rank by own_score).
    neighborhood:
      enabled: false
      n_neighbors: 8         # neighbors to evaluate per finalist (each 1 step)
    # REGIME-SLICED VALIDATION (U4.5). A strategy can look great on average yet
    # be a disaster in one market regime (e.g. it only makes money in strong
    # trends and bleeds in chop). When enabled, each walk-forward SEGMENT is
    # labelled by its realized-volatility tercile (ATR% of price) and its trend
    # strength (median ADX): low / mid / high vol and trend / range by ADX. The
    # per-regime average rank score is stored on the result, and a candidate is
    # promoted only if NO regime's score falls below `floor_mult` times the
    # overall score (i.e. it must not lose catastrophically in any regime). With
    # floor_mult = -0.5 a regime may underperform but not lose more than half the
    # overall edge; set 0.0 to require every regime non-negative. Only finalists
    # pay the cost. Default OFF keeps the old behavior (no regime gate).
    regime:
      enabled: false
      floor_mult: -0.5       # per-regime score must be >= floor_mult * overall
      min_segments_per_regime: 2  # a regime with fewer segments is not gated
      adx_trend_threshold: 25.0   # median ADX >= this labels a segment "trend",
                                  #   else "range" (Wilder's classic threshold)
    # Metric used to rank strategies in memory.
    rank_metric: "expectancy"   # win_rate, profit_factor, max_drawdown,
                                #   expectancy, sharpe
    # Minimum trades a strategy must produce to be trusted. With ~150k bars a
    # real gold edge should trade often, so 40 filters out lucky rare setups
    # without being so high that it empties the registry (that earlier
    # top:0 problem was caused by significance + min_trades together; the
    # rebuild-registry recovery knobs still let you relax this per-run).
    min_trades: 40
    # Statistical-significance filter (Track A / A3, P2.3-P2.4). A strategy
    # that cannot be statistically separated from randomness is still RECORDED
    # in memory but is NEVER promoted to the registry. Uses the pure-Python
    # win_rate_ci_low (Wilson 95% lower bound) and pnl_pvalue (bootstrap
    # p-value that mean PnL <= 0) fields emitted by compute_metrics.
    significance:
      # Master switch for the registry-promotion filter.
      enabled: true
      # Promote only if the bootstrap p-value (averaged across walk-forward
      # segments) is <= this. 0.05 = classic 95% confidence.
      max_pvalue: 0.05
      # Optional extra gate: promote only if the Wilson 95% LOWER bound on the
      # win-rate (averaged across segments) is >= this. 0.0 disables the gate
      # (a profitable strategy can have a win-rate below 0.5, so this is OFF
      # by default; raise it only for win-rate-driven styles).
      min_winrate_ci_low: 0.0
      # Bootstrap resamples for the pnl p-value (U4.1). Higher = a more precise,
      # less noisy p-value at linear CPU cost. 1000 is fine for the fast profile;
      # the deep profile raises this to 5000 so a borderline strategy cannot
      # sneak past on bootstrap noise. 0 or negative disables the bootstrap
      # (p-value forced to 1.0). Read by the search when scoring candidates;
      # leaving it at 1000 reproduces today's behavior exactly.
      n_boot: 1000
  # How many top strategies to blend in the ensemble decision.
  ensemble_top_k: 3

# -----------------------------------------------------------------------------
# News analysis (Phase 4)
# -----------------------------------------------------------------------------
news:
  enabled: true
  # If true and no network/keys available, bot still runs (signal = neutral).
  degrade_gracefully: true
  # Cache directory for downloaded news (avoids hammering sources).
  cache_dir: "data_store/news_cache"
  cache_ttl_minutes: 30
  # Sentiment backend: "lexicon" (offline, no deps) or "vader" (optional dep).
  sentiment_backend: "lexicon"
  # Configurable sources. Each can be toggled. RSS needs no API key.
  sources:
    rss:
      enabled: true
      # Gold-focused feeds first (commodities / precious metals / Fed), plus a
      # broad markets feed. The aggregator filters items by the XAUUSD keyword
      # map, so general feeds still contribute only gold-relevant headlines.
      feeds:
        - "https://www.investing.com/rss/commodities_Gold.rss"
        - "https://www.investing.com/rss/news_25.rss"
        - "https://feeds.marketwatch.com/marketwatch/topstories/"
    newsapi:
      enabled: false
      api_key: ""            # put your https://newsapi.org key here
      query: "forex OR currency OR central bank"
  # Weight of the news signal inside the final decision (0..1).
  signal_weight: 0.2
  # How many minutes around a high-impact event to avoid new trades.
  blackout_minutes: 15

# -----------------------------------------------------------------------------
# Time / Session / Season awareness (Phase 5, user-update-request)
# -----------------------------------------------------------------------------
# The bot can pay attention to WHEN it trades: the FX session (Sydney/Tokyo/
# London/New York and their overlaps), the day of week, and the season
# (month/quarter). It does NOT assume any window is good; it LEARNS from its own
# historical trade outcomes which time buckets were favorable (see the memory
# "time_stats" table). A bucket's edge is only trusted after it has accumulated
# at least learning.min_samples trades; until then the time signal is neutral.
#
# Default is DISABLED so the light live path on Windows 7 is unchanged. Turn it
# on after you have run "search" for a while so the time_stats table is filled.
timing:
  enabled: false
  # How the bar timestamp (OHLCV.time) should be interpreted.
  #   timestamp_is_utc: true  -> the feed timestamps are already UTC.
  #   If your broker feed is in server/local time, set this false and put the
  #   offset (hours to ADD to reach UTC) in utc_offset_hours (often negative,
  #   e.g. a GMT+3 broker uses -3.0).
  timestamp_is_utc: true
  utc_offset_hours: 0.0
  # Approximate UTC session windows [start_hour, end_hour). Windows may wrap
  # past midnight (start > end), e.g. sydney [21, 6]. Tune for your broker.
  sessions:
    sydney:  [21, 6]
    tokyo:   [0, 9]
    london:  [7, 16]
    newyork: [12, 21]
  # How the time signal is used in the decision blend.
  #   as_directional: false -> time is a CONFIDENCE / SIZE modifier + gate only
  #                            (recommended; a session being profitable does not
  #                             tell you the direction).
  #   as_directional: true  -> also feed the learned edge as a directional vote
  #                            with the "weight" below (less principled; off).
  as_directional: false
  weight: 0.0
  # Thresholds on the combined, learned edge (in [-1, +1]).
  favorable_threshold: 0.15
  blackout_threshold: 0.5
  # If true, block NEW entries during unfavorable/blackout time windows.
  gate_unfavorable: false
  # Position-size multiplier range derived from the time edge.
  min_size_mult: 0.5
  max_size_mult: 1.0
  # Relative importance of each bucket type when combining learned edges.
  bucket_weights:
    session: 1.0
    day: 0.8
    hour: 0.6
    month: 0.4
    quarter: 0.3
    season: 0.3
  learning:
    # Minimum trades in a bucket before its edge is trusted (P3.1 raised the
    # default from 20 to 50 because a time bucket with only ~20 trades is
    # statistically noisy - most FX time patterns need many more samples to be
    # real).
    min_samples: 50
    # Bayesian-style shrinkage constant that pulls a bucket's edge toward 0 in
    # proportion to how few samples it has: edge is multiplied by
    # n / (n + shrinkage). A large bucket (n >> shrinkage) keeps almost its raw
    # edge; a tiny bucket (n << shrinkage) is heavily damped toward neutral, so
    # rare buckets cannot hallucinate a strong time pattern. Set to 0 to disable
    # shrinkage entirely (raw edge). Default matches min_samples so a bucket at
    # exactly the trust threshold keeps ~half its edge.
    shrinkage: 50
  # Optionally expose session/day/season as extra ML learner features.
  as_features: false

# -----------------------------------------------------------------------------
# Decision engine - how signals are combined
# -----------------------------------------------------------------------------
decision:
  # ---------------------------------------------------------------------- #
  # Decision mode (UPGRADE_PLAN U2.4, Track "Parity"). Fixes diagnosis D2:
  # in the old "blend" path the live engine averaged the top-K strategies,
  # re-blended that with the ML learner + news, and applied a GLOBAL 0.60
  # threshold - a composite that was NEVER walk-forward validated. Parity mode
  # instead trades the TOP-1 registry strategy EXACTLY as it was validated:
  # its own indicators, its own per-spec long/short thresholds, and its own
  # SL/TP ATR multiples. The learner / news / timing layers become VETO-ONLY
  # gates - they can BLOCK an entry the validated strategy wanted, but they can
  # never create a new entry or change its size/direction. This guarantees
  # "validated == traded".
  #   "parity" (DEFAULT, recommended) - trade the validated top-1 strategy.
  #   "blend"  - legacy research behavior (unvalidated ensemble + ML + news
  #              composite against the global threshold below).
  mode: "parity"
  # Which veto gates are allowed to BLOCK a parity-mode entry (all default ON;
  # each only ever prevents a trade, never forces one). Ignored in blend mode.
  parity_vetoes:
    learner: true   # block if the learner strongly disagrees with the strategy
    news: true      # respect the news blackout window
    timing: true    # respect the learned timing gate / blackout window
  # Learner-disagreement veto strength for parity mode: block a long only if the
  # learner signal is <= -this (and a short only if it is >= +this). 0 disables
  # the learner veto even when parity_vetoes.learner is true. Kept conservative
  # so a weak/uncertain learner never vetoes the validated edge.
  parity_learner_veto_level: 0.5
  # Weights for blending the different signal sources. They are normalized.
  # (The optional "timing" weight is used only when timing.as_directional=true.)
  # NOTE: these weights and the long/short thresholds below apply to "blend"
  # mode only. Parity mode uses each strategy's OWN thresholds instead.
  weights:
    indicators: 0.5
    learning: 0.3
    news: 0.2
    timing: 0.0
  # Probability/score threshold to open a long or short.
  long_threshold: 0.60
  short_threshold: 0.60
  # If true, require indicator and learning signals to agree in direction.
  require_agreement: false
  # ---------------------------------------------------------------------- #
  # Strategy council (Phase 5 / P5, Track B / B1). A light multi-armed-bandit
  # (tabular UCB1, pure Python) that learns a LIVE per-strategy credibility
  # weight from each strategy's own recent realized trade outcomes and uses it
  # to blend the memory-selected ensemble by RECENT performance instead of a
  # flat equal weight. DEFAULT OFF so the light path is unchanged; the council
  # only MODULATES weights within [min_weight, max_weight], it never inverts a
  # signal. Credibility is persisted across restarts (P5.2).
  council:
    enabled: false        # master switch; when false the ensemble stays a plain average
    window: 30            # how many recent trades per strategy define "recent"
    min_trades: 5         # below this many live trades an arm uses the neutral weight
    exploration_c: 1.0    # UCB exploration coefficient (anti-burial for young arms)
    default_weight: 1.0   # weight for unknown / still-warming-up strategies
    min_weight: 0.25      # floor a persistently-losing strategy is damped toward
    max_weight: 1.75      # cap a persistently-winning strategy is boosted toward
    # PnL magnitude that saturates a trade's normalized reward. 0 = use the
    # trade SIGN only (win=1, loss=0), which is robust and currency-independent.
    reward_scale: 0.0

  # Strategy decay monitor (Phase 5 / P5.5-P5.7, Track B / B3): statistical
  # expiry. A promoted strategy was validated on HISTORICAL walk-forward data;
  # markets change, so its live edge can silently decay. This watches, per
  # registry strategy, whether its RECENT realized-PnL distribution has drifted
  # materially below the walk-forward distribution it was promoted on (a Welch
  # two-sample z-test on mean trade PnL plus a relative mean-drop guard). A
  # "suspect" strategy is zero-weighted (dropped) from the ensemble blend until
  # the next search re-validates it. DEFAULT OFF so the light path is unchanged;
  # it is conservative (too little live evidence -> never suspect) and never
  # inverts a signal, it only removes a decayed strategy from the blend.
  decay_monitor:
    enabled: false        # master switch; when false no strategy is ever flagged
    min_recent: 20        # need >= this many recent live trades before any verdict
    min_reference: 20     # need >= this many walk-forward trades to compare against
    z_threshold: 2.0      # |z| beyond which the mean drop is deemed statistically real
    max_rel_drop: 0.5     # recent mean below (1-this)*ref_mean alone trips suspect; 0 disables
    require_both: false   # true = BOTH z-test AND relative-drop must trip; false = EITHER trips
    recent_window: 200    # how many most-recent live trades per strategy to assess

# -----------------------------------------------------------------------------
# Backtest engine (internal, for "backtest" mode)
# -----------------------------------------------------------------------------
backtest:
  initial_balance: 10000.0
  # Cost model - tuned for XAUUSD (gold). Gold spreads are far wider than FX:
  # on M15 a typical broker spread is ~20-35 points (0.20-0.35 in price terms
  # for a 2-digit gold quote). These make backtests realistic instead of
  # optimistic; adjust to YOUR broker's actual gold spread/commission.
  spread_points: 25
  commission_per_lot: 7.0
  slippage_points: 5
  # Position sizing for internal backtests. Gold lots are large in $ terms, so
  # a small fixed lot keeps the simulated equity curve realistic.
  fixed_lot: 0.05
  # Where to store backtest reports.
  report_dir: "backtests"
  # ---------------------------------------------------------------------- #
  # Weekend / rollover swap + Monday gap model (A6 / P3.6). All default to a
  # no-op so the backtester behavior is byte-identical when left untouched.
  # ---------------------------------------------------------------------- #
  # Overnight swap charged (in points) for each UTC day-rollover a position is
  # held over. Positive numbers COST money; use negative to model a credit.
  # Money impact per rollover = swap_pts * point * contract * fixed_lot.
  # 0.0 (default) = no swap modeled = old behavior. Gold/carry pairs benefit
  # most from setting realistic values here.
  # OPTIMIZED for gold: brokers usually charge a swap to HOLD XAUUSD overnight
  # (both directions are often negative for gold). These modest defaults make
  # multi-day holds pay a realistic carry cost so the backtest does not reward
  # strategies that only look good because carry was ignored. Replace with your
  # broker's exact XAUUSD swap points (positive = cost here).
  swap_long_pts: 3.0
  swap_short_pts: 1.5
  # Day of week (0=Mon .. 6=Sun, UTC) that is charged TRIPLE swap to cover the
  # weekend (MT5 convention is Wednesday = 2). Any other value disables the
  # triple-charge and every rollover costs a single swap.
  swap_triple_day: 2
  # When true, model the Monday opening GAP: if a stop-loss sits inside a
  # weekend gap, the position fills at the gapped OPEN price (worse than the
  # stop) instead of at the stop price. false (default) = old behavior where a
  # stop always fills exactly at the stop price.
  # OPTIMIZED for gold: XAUUSD gaps over the weekend, so model the Monday gap -
  # a stop sitting inside the gap fills at the worse gapped open. This stops the
  # backtest from over-crediting weekend-holding gold strategies.
  model_weekend_gap: true
  # ---------------------------------------------------------------------- #
  # Phase U3 - PESSIMISTIC, REALISTIC SIMULATION (fixes diagnosis D3).
  # These knobs make internal backtest numbers move much closer to (and never
  # wildly above) the real MT5 Strategy Tester. Every ambiguity resolves
  # AGAINST the strategy. The DEFAULTS below are the realistic ones; the legacy
  # optimistic behavior stays reachable for before/after sensitivity studies.
  # ---------------------------------------------------------------------- #
  # U3.1 fill policy. "next_open" (DEFAULT, realistic): entries and signal-flip
  # exits fill at the NEXT bar's OPEN plus half-spread and slippage, because a
  # real EA can only act on the open of a new bar - never on the signal bar's
  # close. "signal_close" restores the legacy same-bar-close fills (optimistic;
  # for comparison only). SL/TP always fill intrabar in both modes.
  fill_policy: "next_open"
  # U3.2 intrabar ambiguity. When ONE bar's range touches BOTH the stop and the
  # take, which counts first? "pessimistic" (DEFAULT): the STOP is counted first
  # for both longs and shorts (worst case). "optimistic": the TAKE first.
  # "midpoint": average the two outcomes (for sensitivity analysis only).
  intrabar_policy: "pessimistic"
  # U3.3 session-aware spread. When this sub-block is present the spread WIDENS
  # during the rollover window (and, when wired, around news). Leave it out to
  # keep a constant spread (spread_points above). Money is charged with the
  # widened spread only for trades ENTERED inside the window.
  #   base_points       : normal spread in points (defaults to spread_points).
  #   rollover_mult     : multiply base_points during rollover_hours_utc.
  #   rollover_hours_utc: either an explicit list of UTC hours, or a two-element
  #                       [start, end] inclusive window (wraps past midnight).
  #   news_mult         : reserved for news-window widening (1.0 = no effect).
  spread_model:
    base_points: 25
    rollover_mult: 4.0
    rollover_hours_utc: [21, 23]
    news_mult: 1.0
  # U3.4 position sizing in backtest. "risk_pct" (DEFAULT): size each entry by
  # risk.risk_per_trade of the SIMULATED equity using the SAME formula as
  # RiskManager.position_size (clamped to risk.min_lot / risk.max_lot), so the
  # backtest and live equity curves share geometry AND the risk.max_daily_loss
  # circuit breaker is enforced in simulation. "fixed_lot" restores the legacy
  # constant-lot behavior (fixed_lot above) for comparison.
  sizing: "risk_pct"
  # U3.5 broker minimum stop distance (in points). Simulated entries whose SL
  # sits CLOSER than this are REJECTED (never opened), exactly as the MT5 tester
  # rejects orders inside the broker's stop level. 0 (DEFAULT) disables the
  # check. Set to your broker's XAUUSD stops-level (often ~30-50 points).
  min_stop_points: 0
