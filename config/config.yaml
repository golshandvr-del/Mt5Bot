# =============================================================================
# MT5 Trading Bot - Master Configuration File
# =============================================================================
# This single file controls the ENTIRE bot. Enable/disable heavy features here
# depending on your hardware. On a weak CPU-only Windows 7 machine, keep the
# heavy ML/DL/RL modules disabled and rely on the lightweight ML + indicator
# strategies.
#
# IMPORTANT: Only standard English (ASCII) characters are allowed in this file.
# =============================================================================

# -----------------------------------------------------------------------------
# General runtime settings
# -----------------------------------------------------------------------------
general:
  bot_name: "MT5SmartBot"
  # Operating mode: "live", "paper", "backtest", "search", "train"
  #   live     -> connect to MT5 and place real orders
  #   paper    -> connect to MT5, generate signals, but do NOT place orders
  #   backtest -> run internal walk-forward backtest on historical data
  #   search   -> run strategy/parameter search (Phase 3 memory builder)
  #   train    -> run the offline ML training pipeline (Phase 1)
  mode: "paper"
  # Master switch for heavy compute. On Windows 7 + weak CPU keep this false.
  enable_heavy_compute: false
  # Random seed for reproducibility across the whole project.
  random_seed: 42
  # Timezone used for logging and news alignment (IANA name).
  timezone: "UTC"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"            # DEBUG, INFO, WARNING, ERROR
  log_to_file: true
  log_dir: "logs"
  max_bytes: 5242880       # 5 MB per log file before rotation
  backup_count: 5

# -----------------------------------------------------------------------------
# MT5 connection (Phase: execution layer)
# -----------------------------------------------------------------------------
# These are read by core/data/mt5_connector.py and core/execution/*.
# Leave login/password/server empty to attach to an already-running terminal.
mt5:
  enabled: true
  # Full path to terminal64.exe. Leave empty to auto-detect a running terminal.
  terminal_path: ""
  login: 0                 # account number (0 = use running terminal session)
  password: ""
  server: ""
  # How long to wait for the terminal connection (milliseconds).
  connect_timeout_ms: 60000
  # Symbols the bot is allowed to trade / analyze.
  symbols:
    - "EURUSD"
    - "GBPUSD"
    - "XAUUSD"
  # Default working timeframe for live decisions.
  timeframe: "M15"
  # Timeframes the data layer should fetch for multi-timeframe analysis.
  timeframes:
    - "M5"
    - "M15"
    - "H1"
    - "H4"
  # Number of historical bars to pull for analysis.
  history_bars: 5000

# -----------------------------------------------------------------------------
# Risk and order management (execution layer)
# -----------------------------------------------------------------------------
risk:
  # Risk per trade as a fraction of account equity (0.01 = 1%).
  risk_per_trade: 0.01
  # Hard cap on simultaneous open positions.
  max_open_positions: 3
  # Maximum daily loss as fraction of equity before the bot stops trading.
  max_daily_loss: 0.05
  # Default stop-loss / take-profit in ATR multiples (used if strategy omits).
  default_sl_atr_mult: 2.0
  default_tp_atr_mult: 3.0
  # Minimum and maximum lot sizes (broker-dependent; adjust per symbol).
  min_lot: 0.01
  max_lot: 1.0
  # Slippage tolerance in points.
  deviation_points: 20
  # Magic number to tag this bot's orders inside MT5.
  magic_number: 990011

# -----------------------------------------------------------------------------
# Indicator layer (Phase 2)
# -----------------------------------------------------------------------------
# Each indicator is pluggable. "enabled" toggles it. "params" override defaults.
indicators:
  # Trend
  sma:        { enabled: true,  params: { period: 50 } }
  ema:        { enabled: true,  params: { period: 21 } }
  macd:       { enabled: true,  params: { fast: 12, slow: 26, signal: 9 } }
  adx:        { enabled: true,  params: { period: 14 } }
  ichimoku:   { enabled: false, params: { tenkan: 9, kijun: 26, senkou: 52 } }
  supertrend: { enabled: true,  params: { period: 10, multiplier: 3.0 } }
  # Phase 5 additional trend indicators (pure Python, CPU-light)
  psar:       { enabled: false, params: { step: 0.02, max_step: 0.2 } }
  vwma:       { enabled: false, params: { period: 20 } }
  # Momentum
  rsi:        { enabled: true,  params: { period: 14 } }
  stoch:      { enabled: true,  params: { k: 14, d: 3, smooth: 3 } }
  cci:        { enabled: false, params: { period: 20 } }
  williams_r: { enabled: false, params: { period: 14 } }
  roc:        { enabled: false, params: { period: 12 } }
  # Phase 5 additional momentum indicators
  stochrsi:   { enabled: false, params: { rsi_period: 14, stoch_period: 14 } }
  dpo:        { enabled: false, params: { period: 20 } }
  # Volatility
  atr:        { enabled: true,  params: { period: 14 } }
  bbands:     { enabled: true,  params: { period: 20, std: 2.0 } }
  keltner:    { enabled: false, params: { period: 20, atr_mult: 2.0 } }
  donchian:   { enabled: false, params: { period: 20 } }
  # Volume
  obv:        { enabled: false, params: {} }
  mfi:        { enabled: false, params: { period: 14 } }
  vwap:       { enabled: false, params: {} }
  # Pattern detection
  candle_patterns: { enabled: true, params: {} }

# -----------------------------------------------------------------------------
# Learning core (Phase 1) - each module optional and swappable
# -----------------------------------------------------------------------------
learning:
  # Which learner the decision engine should ask for predictions.
  # Options: "ml_classifier", "rl_agent", "dl_classifier", "transfer",
  #          "self_supervised", "none"
  active_model: "ml_classifier"

  # Per-symbol ML models (A5 / P3.3-P3.4). Default false = one SHARED model for
  # every symbol (byte-identical to the original behavior). When true:
  #   - train (--mode train) trains a SEPARATE learner per symbol and saves each
  #     as models/<model>_<SYMBOL>.pkl so, e.g., XAUUSD does not dilute EURUSD;
  #   - the decision engine loads and uses the model for the symbol it is
  #     deciding on, falling back to the shared model when a per-symbol file is
  #     missing (e.g. that symbol has not been trained yet). Missing files never
  #     crash the bot; the learner simply contributes a neutral signal.
  per_symbol: false

  ml_classifier:
    enabled: true
    # backend: "lightgbm" (preferred, light) or "sklearn_gbdt" (fallback)
    backend: "lightgbm"
    model_file: "models/ml_classifier.pkl"
    # Forward horizon in bars used to build the training label.
    label_horizon: 5
    # Threshold (in ATR units) for labeling up/down/flat.
    label_threshold_atr: 0.5
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    # Phase 5: fit a light Platt-style probability calibrator on a held-out
    # tail of the training data. Cheap on CPU. Set true for better-calibrated
    # confidence used by the decision engine's optional confidence gate.
    calibrate: true

  rl_agent:
    enabled: false           # HEAVY-ish; keep off on weak hardware
    backend: "tabular_q"     # "tabular_q" is CPU-light; avoid deep RL on Win7
    model_file: "models/rl_qtable.pkl"
    episodes: 50
    gamma: 0.95
    alpha: 0.1
    epsilon: 0.1

  dl_classifier:
    enabled: false           # HEAVY; requires tensorflow/torch, off by default
    backend: "keras_mlp"
    model_file: "models/dl_classifier.h5"
    epochs: 20
    batch_size: 64

  transfer:
    enabled: false           # depends on dl_classifier; off by default
    source_model_file: "models/dl_classifier.h5"
    target_model_file: "models/transfer_model.h5"
    freeze_layers: 2
    epochs: 10

  self_supervised:
    enabled: false           # off by default; CPU-light pretext task
    backend: "autoencoder_sklearn"
    model_file: "models/ssl_encoder.pkl"
    code_size: 8

# -----------------------------------------------------------------------------
# Memory & self-improvement (Phase 3)
# -----------------------------------------------------------------------------
memory:
  # SQLite database that persists every backtest result and chosen strategies.
  db_file: "data_store/memory.sqlite"
  # JSON snapshot of the current best-strategy registry (human readable).
  registry_file: "data_store/strategy_registry.json"
  # Walk-forward configuration.
  walk_forward:
    train_bars: 3000
    test_bars: 750
    step_bars: 750
    # Statistical robustness (Track A / A2). These are read by later steps
    # (P1.3 segments, P1.4 holdout). Leaving them at the defaults below keeps
    # today's walk-forward behavior byte-identical.
    # Target number of rolling walk-forward segments. The segmenter will try to
    # produce at least this many by shrinking train_bars when the history is
    # long enough; short history still falls back to the 70/30 split.
    min_segments: 6
    # Bars reserved at the END of history as a locked "quarantine" holdout that
    # the search NEVER sees. 0 = OFF (no holdout, behavior unchanged). When > 0,
    # a strategy is only promoted to the registry if it also passes on this
    # untouched holdout.
    holdout_bars: 0
    # Recency weighting (Track B / B8, P6.1). When aggregating the per-segment
    # walk-forward scores into a single number, newer segments can be made to
    # count MORE than older ones via a geometric decay: the i-th oldest segment
    # (0 = oldest) gets weight recency_decay ** (last_index - i), so the most
    # recent segment always has weight 1.0. This guards against a strategy that
    # was great years ago but has quietly stopped working. 1.0 = OFF (plain
    # average, behavior byte-identical to before); a value in (0, 1) such as 0.9
    # down-weights older segments. Values <= 0 or > 1 are clamped back to 1.0.
    recency_decay: 1.0
  # Strategy/parameter search configuration.
  search:
    method: "random"         # "grid" or "random"
    max_trials: 200
    # Metric used to rank strategies in memory.
    rank_metric: "expectancy"   # win_rate, profit_factor, max_drawdown,
                                #   expectancy, sharpe
    # Minimum trades a strategy must produce to be trusted.
    min_trades: 30
    # Statistical-significance filter (Track A / A3, P2.3-P2.4). A strategy
    # that cannot be statistically separated from randomness is still RECORDED
    # in memory but is NEVER promoted to the registry. Uses the pure-Python
    # win_rate_ci_low (Wilson 95% lower bound) and pnl_pvalue (bootstrap
    # p-value that mean PnL <= 0) fields emitted by compute_metrics.
    significance:
      # Master switch for the registry-promotion filter.
      enabled: true
      # Promote only if the bootstrap p-value (averaged across walk-forward
      # segments) is <= this. 0.05 = classic 95% confidence.
      max_pvalue: 0.05
      # Optional extra gate: promote only if the Wilson 95% LOWER bound on the
      # win-rate (averaged across segments) is >= this. 0.0 disables the gate
      # (a profitable strategy can have a win-rate below 0.5, so this is OFF
      # by default; raise it only for win-rate-driven styles).
      min_winrate_ci_low: 0.0
  # How many top strategies to blend in the ensemble decision.
  ensemble_top_k: 3

# -----------------------------------------------------------------------------
# News analysis (Phase 4)
# -----------------------------------------------------------------------------
news:
  enabled: true
  # If true and no network/keys available, bot still runs (signal = neutral).
  degrade_gracefully: true
  # Cache directory for downloaded news (avoids hammering sources).
  cache_dir: "data_store/news_cache"
  cache_ttl_minutes: 30
  # Sentiment backend: "lexicon" (offline, no deps) or "vader" (optional dep).
  sentiment_backend: "lexicon"
  # Configurable sources. Each can be toggled. RSS needs no API key.
  sources:
    rss:
      enabled: true
      feeds:
        - "https://www.investing.com/rss/news_25.rss"
        - "https://feeds.marketwatch.com/marketwatch/topstories/"
    newsapi:
      enabled: false
      api_key: ""            # put your https://newsapi.org key here
      query: "forex OR currency OR central bank"
  # Weight of the news signal inside the final decision (0..1).
  signal_weight: 0.2
  # How many minutes around a high-impact event to avoid new trades.
  blackout_minutes: 15

# -----------------------------------------------------------------------------
# Time / Session / Season awareness (Phase 5, user-update-request)
# -----------------------------------------------------------------------------
# The bot can pay attention to WHEN it trades: the FX session (Sydney/Tokyo/
# London/New York and their overlaps), the day of week, and the season
# (month/quarter). It does NOT assume any window is good; it LEARNS from its own
# historical trade outcomes which time buckets were favorable (see the memory
# "time_stats" table). A bucket's edge is only trusted after it has accumulated
# at least learning.min_samples trades; until then the time signal is neutral.
#
# Default is DISABLED so the light live path on Windows 7 is unchanged. Turn it
# on after you have run "search" for a while so the time_stats table is filled.
timing:
  enabled: false
  # How the bar timestamp (OHLCV.time) should be interpreted.
  #   timestamp_is_utc: true  -> the feed timestamps are already UTC.
  #   If your broker feed is in server/local time, set this false and put the
  #   offset (hours to ADD to reach UTC) in utc_offset_hours (often negative,
  #   e.g. a GMT+3 broker uses -3.0).
  timestamp_is_utc: true
  utc_offset_hours: 0.0
  # Approximate UTC session windows [start_hour, end_hour). Windows may wrap
  # past midnight (start > end), e.g. sydney [21, 6]. Tune for your broker.
  sessions:
    sydney:  [21, 6]
    tokyo:   [0, 9]
    london:  [7, 16]
    newyork: [12, 21]
  # How the time signal is used in the decision blend.
  #   as_directional: false -> time is a CONFIDENCE / SIZE modifier + gate only
  #                            (recommended; a session being profitable does not
  #                             tell you the direction).
  #   as_directional: true  -> also feed the learned edge as a directional vote
  #                            with the "weight" below (less principled; off).
  as_directional: false
  weight: 0.0
  # Thresholds on the combined, learned edge (in [-1, +1]).
  favorable_threshold: 0.15
  blackout_threshold: 0.5
  # If true, block NEW entries during unfavorable/blackout time windows.
  gate_unfavorable: false
  # Position-size multiplier range derived from the time edge.
  min_size_mult: 0.5
  max_size_mult: 1.0
  # Relative importance of each bucket type when combining learned edges.
  bucket_weights:
    session: 1.0
    day: 0.8
    hour: 0.6
    month: 0.4
    quarter: 0.3
    season: 0.3
  learning:
    # Minimum trades in a bucket before its edge is trusted (P3.1 raised the
    # default from 20 to 50 because a time bucket with only ~20 trades is
    # statistically noisy - most FX time patterns need many more samples to be
    # real).
    min_samples: 50
    # Bayesian-style shrinkage constant that pulls a bucket's edge toward 0 in
    # proportion to how few samples it has: edge is multiplied by
    # n / (n + shrinkage). A large bucket (n >> shrinkage) keeps almost its raw
    # edge; a tiny bucket (n << shrinkage) is heavily damped toward neutral, so
    # rare buckets cannot hallucinate a strong time pattern. Set to 0 to disable
    # shrinkage entirely (raw edge). Default matches min_samples so a bucket at
    # exactly the trust threshold keeps ~half its edge.
    shrinkage: 50
  # Optionally expose session/day/season as extra ML learner features.
  as_features: false

# -----------------------------------------------------------------------------
# Decision engine - how signals are combined
# -----------------------------------------------------------------------------
decision:
  # Weights for blending the different signal sources. They are normalized.
  # (The optional "timing" weight is used only when timing.as_directional=true.)
  weights:
    indicators: 0.5
    learning: 0.3
    news: 0.2
    timing: 0.0
  # Probability/score threshold to open a long or short.
  long_threshold: 0.60
  short_threshold: 0.60
  # If true, require indicator and learning signals to agree in direction.
  require_agreement: false
  # ---------------------------------------------------------------------- #
  # Strategy council (Phase 5 / P5, Track B / B1). A light multi-armed-bandit
  # (tabular UCB1, pure Python) that learns a LIVE per-strategy credibility
  # weight from each strategy's own recent realized trade outcomes and uses it
  # to blend the memory-selected ensemble by RECENT performance instead of a
  # flat equal weight. DEFAULT OFF so the light path is unchanged; the council
  # only MODULATES weights within [min_weight, max_weight], it never inverts a
  # signal. Credibility is persisted across restarts (P5.2).
  council:
    enabled: false        # master switch; when false the ensemble stays a plain average
    window: 30            # how many recent trades per strategy define "recent"
    min_trades: 5         # below this many live trades an arm uses the neutral weight
    exploration_c: 1.0    # UCB exploration coefficient (anti-burial for young arms)
    default_weight: 1.0   # weight for unknown / still-warming-up strategies
    min_weight: 0.25      # floor a persistently-losing strategy is damped toward
    max_weight: 1.75      # cap a persistently-winning strategy is boosted toward
    # PnL magnitude that saturates a trade's normalized reward. 0 = use the
    # trade SIGN only (win=1, loss=0), which is robust and currency-independent.
    reward_scale: 0.0

  # Strategy decay monitor (Phase 5 / P5.5-P5.7, Track B / B3): statistical
  # expiry. A promoted strategy was validated on HISTORICAL walk-forward data;
  # markets change, so its live edge can silently decay. This watches, per
  # registry strategy, whether its RECENT realized-PnL distribution has drifted
  # materially below the walk-forward distribution it was promoted on (a Welch
  # two-sample z-test on mean trade PnL plus a relative mean-drop guard). A
  # "suspect" strategy is zero-weighted (dropped) from the ensemble blend until
  # the next search re-validates it. DEFAULT OFF so the light path is unchanged;
  # it is conservative (too little live evidence -> never suspect) and never
  # inverts a signal, it only removes a decayed strategy from the blend.
  decay_monitor:
    enabled: false        # master switch; when false no strategy is ever flagged
    min_recent: 20        # need >= this many recent live trades before any verdict
    min_reference: 20     # need >= this many walk-forward trades to compare against
    z_threshold: 2.0      # |z| beyond which the mean drop is deemed statistically real
    max_rel_drop: 0.5     # recent mean below (1-this)*ref_mean alone trips suspect; 0 disables
    require_both: false   # true = BOTH z-test AND relative-drop must trip; false = EITHER trips
    recent_window: 200    # how many most-recent live trades per strategy to assess

# -----------------------------------------------------------------------------
# Backtest engine (internal, for "backtest" mode)
# -----------------------------------------------------------------------------
backtest:
  initial_balance: 10000.0
  # Cost model.
  spread_points: 10
  commission_per_lot: 7.0
  slippage_points: 2
  # Position sizing for internal backtests.
  fixed_lot: 0.10
  # Where to store backtest reports.
  report_dir: "backtests"
  # ---------------------------------------------------------------------- #
  # Weekend / rollover swap + Monday gap model (A6 / P3.6). All default to a
  # no-op so the backtester behavior is byte-identical when left untouched.
  # ---------------------------------------------------------------------- #
  # Overnight swap charged (in points) for each UTC day-rollover a position is
  # held over. Positive numbers COST money; use negative to model a credit.
  # Money impact per rollover = swap_pts * point * contract * fixed_lot.
  # 0.0 (default) = no swap modeled = old behavior. Gold/carry pairs benefit
  # most from setting realistic values here.
  swap_long_pts: 0.0
  swap_short_pts: 0.0
  # Day of week (0=Mon .. 6=Sun, UTC) that is charged TRIPLE swap to cover the
  # weekend (MT5 convention is Wednesday = 2). Any other value disables the
  # triple-charge and every rollover costs a single swap.
  swap_triple_day: 2
  # When true, model the Monday opening GAP: if a stop-loss sits inside a
  # weekend gap, the position fills at the gapped OPEN price (worse than the
  # stop) instead of at the stop price. false (default) = old behavior where a
  # stop always fills exactly at the stop price.
  model_weekend_gap: false
