# CI WORKFLOW TEMPLATE (manual-install copy) - see structure.md P4.1
#
# WHY THIS FILE EXISTS HERE (and not directly at .github/workflows/ci.yml):
# The automated push credential used by this project (a GitHub App) currently
# lacks the `workflows` permission, so it is REFUSED when it tries to create or
# update any file under `.github/workflows/`. This template is the byte-for-byte
# content of the intended workflow, kept UNDER mt5/mt5_bot/ (where the App CAN
# push) so it is preserved in version control until the permission is granted.
#
# HOW TO ACTIVATE IT (one-time, either option):
#   Option A (grant permission, preferred): grant the Genspark/GitHub App the
#     `workflows` permission for this repo, then let the assistant (or you) copy
#     this file to `.github/workflows/ci.yml` at the REPO ROOT and push.
#   Option B (do it by hand in the GitHub web UI): create a new file at
#     `.github/workflows/ci.yml` and paste everything BELOW the marker line.
#
# The workflow itself is stdlib-only (no MetaTrader5, no network, no heavy
# deps): it just runs the offline test suite from mt5/mt5_bot on push/PR under
# Python 3.8, mirroring the local offline gate. It has ZERO effect on the
# Windows 7 runtime.
#
# ----- COPY EVERYTHING BELOW THIS LINE INTO .github/workflows/ci.yml -----
name: offline-tests
on:
  push:
  pull_request:
jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - run: python tests/run_all.py
        
